name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs-unstable
        
    - name: Setup Devbox
      run: |
        curl -fsSL https://jetify.dev/devbox/install | sh
        echo "$HOME/.devbox/bin" >> $GITHUB_PATH
        
    - name: Build packages
      run: |
        devbox run just build
        
    - name: Test packages
      run: |
        devbox run just test
        
    - name: Generate packaging
      run: |
        devbox run just generate-all
        
    - name: Create release artifacts
      run: |
        devbox run just release-internal
        
    - name: Generate release notes
      id: release_notes
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "## 🚀 Command Governance v$VERSION" > release_notes.md
        echo "" >> release_notes.md
        echo "### 📦 Available Packages" >> release_notes.md
        echo "" >> release_notes.md
        echo "This release includes:" >> release_notes.md
        echo "- **49 individual governance packages**" >> release_notes.md
        echo "- **6 logical bundle packages** >> release_notes.md
        echo "- **Cross-ecosystem support** (Nix, Alpine, Debian, Fedora, Arch, Homebrew, mise)" >> release_notes.md
        echo "" >> release_notes.md
        echo "### 🎯 Key Features" >> release_notes.md
        echo "- **Dynamic package detection** - Wrappers detect available alternatives" >> release_notes.md
        echo "- **AI agent harness** - Enforces tooling preferences for automated systems" >> release_notes.md
        echo "- **Logical bundles** - Organized by tool categories" >> release_notes.md
        echo "- **Comprehensive testing** - 19 test scenarios across all governance types" >> release_notes.md
        echo "" >> release_notes.md
        echo "### 📋 Installation" >> release_notes.md
        echo "" >> release_notes.md
        echo "#### With Devbox" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo "devbox add github:levonk/levonk-packages#prefer-pnpm" >> release_notes.md
        echo "devbox add github:levonk/levonk-packages#nodejs-ecosystem" >> release_notes.md
        echo "```" >> release_notes.md
        echo "" >> release_notes.md
        echo "#### With Nix" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo "nix build .#prefer-pnpm" >> release_notes.md
        echo "nix build .#command-governance" >> release_notes.md
        echo "```" >> release_notes.md
        echo "" >> release_notes.md
        echo "### 🔧 Changes" >> release_notes.md
        echo "See [CHANGELOG.md](https://github.com/levonk/levonk-packages/blob/main/docs/CHANGELOG.md) for detailed changes." >> release_notes.md
        echo "" >> release_notes.md
        echo "---" >> release_notes.md
        echo "*Generated by GitHub Actions*" >> release_notes.md
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
        body_path: release_notes.md
        draft: false
        prerelease: false
        name: Command Governance v${{ steps.version.outputs.version }}
        
    - name: Upload to Package Registries
      run: |
        echo "🚀 Package registry uploads would go here"
        echo "TODO: Configure automated uploads to:"
        echo "  - Alpine Linux repository"
        echo "  - Debian/Ubuntu PPA"
        echo "  - Fedora COPR"
        echo "  - Arch Linux AUR"
        echo "  - Homebrew tap"
        echo "  - mise registry"
